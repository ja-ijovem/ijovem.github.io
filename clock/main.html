
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clockITDP - Gestor de Horários</title>
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestor de Horários</h1>
            <h2>clockITDP</h2>
        </header>
        
        <main>
            <div id="calculator" class="tab-content active">
                <form id="timeForm">
                    <div class="input-group">
                        <label for="clockIn">Horário de Entrada:</label>
                        <input type="text" id="clockIn" required step="60" min="00:00" max="23:59">
                    </div>
                    
                    <div class="input-group">
                        <label for="intervalStart">Início do Intervalo:</label>
                        <input type="text" id="intervalStart" required step="60" min="00:00" max="23:59">
                    </div>
                    
                    <div class="input-group">
                        <label for="intervalEnd">Fim do Intervalo:</label>
                        <input type="text" id="intervalEnd" required step="60" min="00:00" max="23:59">
                    </div>
                    
                    <button type="submit">Calcular Horário de Saída</button>
                </form>
            </div>
        </main>
        
    </div>
    
    <script src="script.js"></script>

  <!-- Modal (continua escondido até ser aberto) -->
<div id="resultModal" class="modal hidden">
  <div class="modal-content">
    <span id="closeModal" class="close-button">&times;</span>
    <h3>Resultado</h3>

    <!-- Tabela resumindo as informações -->
    <table class="result-table">
      <thead>
        <tr>
          <th>Tipo de Jornada</th>          <!-- 6 h ou 8 h -->
          <th>Total de Horas</th>           <!-- "6h 0min" / "8h 0min" -->
          <th>Horário de Saída</th>        <!-- 17:30 etc. -->
          <th>Tempo até Saída</th>          <!-- "2h 15min" ou "135 minutos" -->
        </tr>
      </thead>
      <tbody>
        <!-- Linha 1 → Jornada de 6 h -->
        <tr id="row6h">
          <td>Jornada de 6 h</td>
          <td id="totalHours1"></td>
          <td id="clockOutTime1"></td>
          <td id="timeToClockOut1"></td>
        </tr>

        <!-- Linha 2 → Jornada de 8 h -->
        <tr id="row8h">
          <td>Jornada de 8 h</td>
          <td id="totalHours2"></td>
          <td id="clockOutTime2"></td>
          <td id="timeToClockOut2"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>


</body>
</html>
