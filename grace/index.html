<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Preços</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .tab {
            padding: 10px;
            font-weight: bold;
            color: #666;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: #28a745;
            border-bottom: 2px solid #28a745;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            color: #fff;
            background-color: #28a745;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Comparador de Preços</h1>

        <!-- Abas para Alternar entre as Seções -->
        <div class="tabs">
            <div class="tab active" onclick="toggleTab('compararOpcoesTab')">Comparar Opções</div>
            <div class="tab" onclick="toggleTab('calcularValorTab')">Calcular por Peso</div>
            <div class="tab" onclick="toggleTab('calcularDescontoTab')">Calcular Desconto</div>
            <div class="tab" onclick="toggleTab('compararProporcaoTab')">Proporção Peso/Volume</div>
        </div>

        <!-- Seção Comparar Preços entre Opções -->
        <div id="compararOpcoesTab" class="section active">
            <div class="input-group">
                <h2 id="tituloOp1">Opção 1</h2>
                <label>Valor (R$):</label>
                <input type="number" id="valor1" placeholder="Digite o valor">
                <label>Quantidade:</label>
                <input type="number" id="quantidade1" placeholder="Digite a quantidade">
            </div>
            <div class="input-group">
                <h2 id="tituloOp2">Opção 2</h2>
                <label>Valor (R$):</label>
                <input type="number" id="valor2" placeholder="Digite o valor">
                <label>Quantidade:</label>
                <input type="number" id="quantidade2" placeholder="Digite a quantidade">
            </div>
            <button onclick="compararOpcoes()">Comparar Opções</button>
        </div>

        <!-- Seção Calcular Valor por Peso -->
        <div id="calcularValorTab" class="section">
            <div class="input-group">
                <label>Valor por quilo (R$):</label>
                <input type="number" id="valorKilo" placeholder="Digite o valor por quilo">
                <label>Quantidade em gramas:</label>
                <input type="number" id="gramas" placeholder="Digite a quantidade em gramas">
            </div>
            <button onclick="calcularValorPorPeso()">Calcular Valor</button>
            <p class="result" id="resultadoPeso"></p>
        </div>

        <!-- Seção Calcular Valor com Desconto -->
        <div id="calcularDescontoTab" class="section">
            <div class="input-group">
                <label>Valor Original (R$):</label>
                <input type="number" id="valorOriginal" placeholder="Digite o valor original">
                <label>Desconto (%):</label>
                <input type="number" id="percentualDesconto" placeholder="Digite o percentual de desconto">
            </div>
            <button onclick="calcularValorComDesconto()">Calcular com Desconto</button>
            <p class="result" id="resultadoDesconto"></p>
        </div>

        <!-- Seção Comparar Proporção Peso/Volume -->
        <div id="compararProporcaoTab" class="section">
            <div class="input-group">
                <label>Peso Opção 1 (g):</label>
                <input type="number" id="peso1" placeholder="Digite o peso da opção 1">
                <label>Volume Opção 1 (ml):</label>
                <input type="number" id="volume1" placeholder="Digite o volume da opção 1">
            </div>
            <div class="input-group">
                <label>Peso Opção 2 (g):</label>
                <input type="number" id="peso2" placeholder="Digite o peso da opção 2">
                <label>Volume Opção 2 (ml):</label>
                <input type="number" id="volume2" placeholder="Digite o volume da opção 2">
            </div>
            <button onclick="compararProporcaoPesoVolume()">Comparar Proporções</button>
            <p class="result" id="resultadoProporcao"></p>
        </div>
    </div>

    <script>
        // Alterna entre as abas
        function toggleTab(tabId) {
            document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelector(`.tab[onclick="toggleTab('${tabId}')"]`).classList.add('active');
        }

        // Função para comparar opções e destacar a mais barata
        function compararOpcoes() {
            const valor1 = parseFloat(document.getElementById('valor1').value);
            const quantidade1 = parseInt(document.getElementById('quantidade1').value);
            const valor2 = parseFloat(document.getElementById('valor2').value);
            const quantidade2 = parseInt(document.getElementById('quantidade2').value);

            const precoPorOvo1 = valor1 / quantidade1;
            const precoPorOvo2 = valor2 / quantidade2;

            const tituloOp1 = document.getElementById('tituloOp1');
            const tituloOp2 = document.getElementById('tituloOp2');

            if (precoPorOvo1 < precoPorOvo2) {
                tituloOp1.innerText = 'Opção 1 - Mais barata';
                tituloOp2.innerText = 'Opção 2';
            } else {
                tituloOp1.innerText = 'Opção 1';
                tituloOp2.innerText = 'Opção 2 - Mais barata';
            }
        }

        // Função para calcular o valor por peso
        function calcularValorPorPeso() {
            const valorKilo = parseFloat(document.getElementById('valorKilo').value);
            const gramas = parseInt(document.getElementById('gramas').value);

            const precoPorGrama = valorKilo / 1000;
            const valorTotal = precoPorGrama * gramas;

            document.getElementById('resultadoPeso').innerText = `Valor correspondente: R$ ${valorTotal.toFixed(2)}`;
        }

        // Função para calcular o valor com desconto
        function calcularValorComDesconto() {
            const valorOriginal = parseFloat(document.getElementById('valorOriginal').value);
            const percentualDesconto = parseFloat(document.getElementById('percentualDesconto').value);

            const valorDesconto = valorOriginal * (percentualDesconto / 100);
            const valorComDesconto = valorOriginal - valorDesconto;

            document.getElementById('resultadoDesconto').innerText = `Valor com desconto: R$ ${valorComDesconto.toFixed(2)}`;
        }

        // Função para comparar proporção peso/volume
        function compararProporcaoPesoVolume() {
            const peso1 = parseFloat(document.getElementById('peso1').value);
            const volume1 = parseFloat(document.getElementById('volume1').value);
            const peso2 = parseFloat(document.getElementById('peso2').value);
            const volume2 = parseFloat(document.getElementById('volume2').value);

            const proporcao1 = peso1 / volume1;
            const proporcao2 = peso2 / volume2;

            const resultadoProporcao = document.getElementById('resultadoProporcao');
            if (proporcao1 > proporcao2) {
                resultadoProporcao.innerText = 'Opção 1 possui maior proporção peso/volume';
            } else if (proporcao2 > proporcao1) {
                resultadoProporcao.innerText = 'Opção 2 possui maior proporção peso/volume';
            } else {
                resultadoProporcao.innerText = 'Ambas as opções possuem a mesma proporção peso/volume';
            }
        }
    </script>
</body>
</html>
